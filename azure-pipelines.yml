trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  # Caminho exato do seu projeto da API
  projectPath: '**/SistemaERPOnlineAPI.csproj'
  buildPlatform: 'AnyCPU'
  buildConfiguration: 'Release'
  
  # CONFIGURAÇÃO DO AZURE: Substitua com os dados reais do seu portal do Azure
  azureServiceConnection: 'SuaConexaoAzure'
  azureWebAppName: 'seu-app-service-api'

steps:
# 1. Garante a instalação do NuGet no ambiente
- task: NuGetToolInstaller@1
  displayName: 'Garantir Instalador do NuGet'

# 2. Executa a restauração dos pacotes no local correto exigido pelo .csproj
- powershell: |
    $csproj = Get-Item "$(projectPath)"
    $solutionDir = $csproj.Directory.Parent.FullName
    nuget restore "$($csproj.FullName)" -PackagesDirectory "$solutionDir\packages"
  displayName: 'Restaurar Pacotes NuGet via PowerShell'

# 3. Compila a Web API gerando o pacote .zip oficial do Web Deploy
- task: VSBuild@1
  displayName: 'Compilar Web API para o Azure'
  inputs:
    solution: '$(projectPath)'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'
    # Altera os argumentos para empacotar tudo em um único arquivo .zip na raiz de staging
    msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="$(build.artifactStagingDirectory)\webapi.zip"'
    clean: true

# 4. Envia o pacote compactado diretamente para o seu Azure App Service
- task: AzureRmWebAppDeployment@4
  displayName: 'Deploy Automático no Azure App Service'
  inputs:
    ConnectionType: 'AzureRM'
    azureSubscription: '$(azureServiceConnection)'
    appType: 'webApp'
    WebAppName: '$(azureWebAppName)'
    package: '$(build.artifactStagingDirectory)\webapi.zip'
