trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  # Caminho exato do novo projeto fornecido no arquivo xml
  projectPath: '**/SistemaERPOnlineAPI.csproj'
  buildPlatform: 'AnyCPU' # Configurado sem espaços para ativar a tag <OutputPath>bin\</OutputPath> do seu csproj
  buildConfiguration: 'Release'

steps:
# 1. Garante a instalação do NuGet na versão estável do pool Windows
- task: NuGetToolInstaller@1
  displayName: 'Garantir Instalador do NuGet'

# 2. Executa a restauração forçando a pasta 'packages' no nível correto exigido pelo novo .csproj
- powershell: |
    $csproj = Get-Item "$(projectPath)"
    $projectDir = $csproj.Directory.FullName
    $solutionDir = $csproj.Directory.Parent.FullName
    
    Write-Host "Diretório do projeto: $projectDir"
    Write-Host "Diretório da Solução (Raiz): $solutionDir"
    
    # Restaura pacotes como MySql.Data 9.7.0 e Swashbuckle 5.6.0 mapeados no seu XML
    nuget restore "$($csproj.FullName)" -PackagesDirectory "$solutionDir\packages"
  displayName: 'Restaurar Pacotes NuGet via PowerShell'

# 3. Compilação da Web API estruturada para o formato de arquivos aceito pelo Somee
- task: VSBuild@1
  displayName: 'Compilar Web API / .NET Framework'
  inputs:
    solution: '$(projectPath)'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'
    # Extrai o site limpo (FileSystem) salvando na pasta de artefatos
    msbuildArgs: '/p:DeployOnBuild=true /p:DeployDefaultTarget=WebPublish /p:WebPublishMethod=Package /p:PackageAsSingleFile=false /p:publishUrl="$(build.artifactStagingDirectory)\ApiPronta" /p:DeleteExistingFiles=True'
    clean: true

# 4. Publicação da pasta gerada contendo a pasta bin/, web.config e arquivos globais
- task: PublishBuildArtifacts@1
  displayName: 'Disponibilizar Artefato para o Somee'
  inputs:
    PathtoPublish: '$(build.artifactStagingDirectory)\_PublishedWebsites\SistemaERPOnlineAPI'
    ArtifactName: 'WebApiSomee'
    publishLocation: 'Container'
